arena:
  docker:
    image: "qwen-arena:latest"
    memory_limit: "2g"
    cpu_limit: 2
    timeout_seconds: 60
    network: "none"
    working_dir: "/workspace"

  episode:
    max_tool_calls: 20
    max_time_seconds: 60

  tools:
    enabled:
      - think
      - bash
      - python
      - read_file
      - write_file
      - sql
      - api_call
      - submit

  pool:
    warmup_containers: 4
    reuse_with_cleanup: true
