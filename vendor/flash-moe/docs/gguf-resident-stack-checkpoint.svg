<svg xmlns="http://www.w3.org/2000/svg" width="1220" height="820" viewBox="0 0 1220 820" role="img" aria-labelledby="title desc">
  <title id="title">GGUF Resident Stack Checkpoint</title>
  <desc id="desc">Resident GGUF checkpoint after finishing the non-shared persistent Q8_0 linear tensors attn_gate and ssm_out. The isolated linear overlay is a keep, and the combined resident stack reaches 3.42 full 2k-token perplexity on the 4-bit path.</desc>
