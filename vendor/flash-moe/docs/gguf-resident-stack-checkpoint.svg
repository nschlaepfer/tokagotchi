  <text class="section" x="760" y="486">Takeaways</text>
  <rect class="note" x="760" y="514" width="352" height="178" rx="16"/>
  <text class="small" x="784" y="548">1. `attn_gate` and `ssm_out` are now finished as a resident GGUF `Q8_0` overlay.</text>
  <text class="small" x="784" y="576">2. The isolated linear overlay is a real quality win over the plain 4-bit baseline.</text>
  <text class="small" x="784" y="604">3. Adding the linear overlay improves the best full resident 2k PPL from `3.49` to `3.42`.</text>
  <text class="small" x="784" y="632">4. Remaining blocked work is shared experts, which stays closed until explicitly reopened.</text>
  <text class="small" x="784" y="672">Checkpoint: docs/gguf-resident-stack-checkpoint.svg</text>
  <text class="small" x="784" y="698">Notebook: docs/gguf-hybrid-bringup-log.md</text>
  <text class="small" x="784" y="724">Artifacts: autoresearch/gguf/linear_q8_0.bin + linear_q8_0.json</text>
