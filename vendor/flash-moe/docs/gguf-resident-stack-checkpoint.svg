  <text class="title" x="56" y="62">GGUF Resident Stack Checkpoint</text>
  <text class="subtitle" x="56" y="92">2026-03-20. Non-shared persistent tensors are now covered: embedding, LM head, linear-attention QKV, full attention, attn_gate, and ssm_out.</text>

  <rect class="panel" x="44" y="122" width="1132" height="654" rx="18"/>

