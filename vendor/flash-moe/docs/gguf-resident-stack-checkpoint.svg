      .small { fill: #6b645c; font: 400 13px Helvetica, Arial, sans-serif; }
      .label { fill: #2f2a24; font: 600 15px Helvetica, Arial, sans-serif; }
      .axis { stroke: #b8aea0; stroke-width: 1.5; }
      .grid { stroke: #e3ddd4; stroke-width: 1; }
