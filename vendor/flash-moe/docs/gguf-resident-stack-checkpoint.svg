  <text class="small" x="72" y="186">Scope: resident GGUF overlays only. Shared experts and streamed experts remain out of scope by design.</text>
  <text class="small" x="72" y="206">New completion point: resident Q8_0 linear overlay for `blk.*.attn_gate.weight` and `blk.*.ssm_out.weight`.</text>

