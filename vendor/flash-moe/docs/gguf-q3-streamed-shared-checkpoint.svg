  <text class="section" x="740" y="418">Full 2k Throughput</text>
  <line class="axis" x1="910" y1="456" x2="1220" y2="456"/>
  <line class="grid" x1="910" y1="456" x2="910" y2="590"/>
  <line class="grid" x1="987" y1="456" x2="987" y2="590"/>
