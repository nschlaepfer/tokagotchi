  <text class="small" x="352" y="610">1.0</text>
  <text class="small" x="462" y="610">2.0</text>
  <text class="small" x="572" y="610">3.0</text>
  <text class="small" x="682" y="610">4.0</text>

  <text class="label" x="72" y="484">4-bit baseline</text>
  <rect class="barA" x="250" y="468" width="400" height="20" rx="10"/>
  <text class="value" x="660" y="484">3.64</text>

  <text class="label" x="72" y="528">Q3-GGUF experts</text>
  <rect class="barB" x="250" y="512" width="419" height="20" rx="10"/>
  <text class="value" x="679" y="528">3.81</text>

  <text class="label" x="72" y="572">Q3-GGUF + GGUF LM head</text>
  <rect class="barC" x="250" y="556" width="417" height="20" rx="10"/>
