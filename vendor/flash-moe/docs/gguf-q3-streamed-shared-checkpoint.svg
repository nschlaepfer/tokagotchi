<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="940" viewBox="0 0 1320 940" role="img" aria-labelledby="title desc">
  <title id="title">GGUF Streamed Q3 And Shared Expert Checkpoint</title>
  <desc id="desc">Checkpoint for the routed streamed GGUF Q3 expert migration and the current shared-expert status. Routed experts are fully converted to exact GGUF bytes. Shared experts remain a separate mostly-Q8_0 family that is not scripted yet.</desc>
  <defs>
    <style>
      .bg { fill: #f5f1e8; }
      .panel { fill: #fffdf8; stroke: #d7cebe; stroke-width: 2; }
      .title { fill: #1f1f1f; font: 700 30px Helvetica, Arial, sans-serif; }
      .subtitle { fill: #5c554c; font: 400 16px Helvetica, Arial, sans-serif; }
      .section { fill: #2d2924; font: 700 20px Helvetica, Arial, sans-serif; }
      .tableh { fill: #4a433b; font: 700 13px Helvetica, Arial, sans-serif; }
      .table { fill: #2f2a24; font: 400 13px Helvetica, Arial, sans-serif; }
      .value { fill: #1f1f1f; font: 700 13px Helvetica, Arial, sans-serif; }
      .label { fill: #2f2a24; font: 600 15px Helvetica, Arial, sans-serif; }
      .small { fill: #6b645c; font: 400 13px Helvetica, Arial, sans-serif; }
      .axis { stroke: #b8aea0; stroke-width: 1.4; }
      .grid { stroke: #e3ddd4; stroke-width: 1; }
      .good { fill: #dff2e7; }
      .warn { fill: #fff4e7; }
      .note { fill: #f1ebe0; }
      .barA { fill: #cf6d31; }
      .barB { fill: #2e8b71; }
      .barC { fill: #1f6f5b; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1320" height="940"/>
  <text class="title" x="56" y="62">GGUF Streamed Q3 And Shared Expert Checkpoint</text>
  <text class="subtitle" x="56" y="92">2026-03-20. Routed streamed experts are now on exact GGUF bytes. Shared experts remain a separate mostly-`Q8_0` family with no converter script yet.</text>

  <rect class="panel" x="44" y="122" width="1232" height="782" rx="18"/>

  <text class="section" x="72" y="162">Summary</text>
  <text class="small" x="72" y="186">Scope: streamed routed experts and the shared-expert planning state. Resident overlays are tracked in the resident checkpoint SVGs.</text>

  <rect x="72" y="214" width="1176" height="36" fill="#efe7db" rx="8"/>
  <text class="tableh" x="92" y="237">Configuration</text>
  <text class="tableh" x="360" y="237">Full 2k PPL</text>
  <text class="tableh" x="470" y="237">2k tok/s</text>
  <text class="tableh" x="570" y="237">200 tok/s avg</text>
  <text class="tableh" x="690" y="237">Expert I/O avg</text>
  <text class="tableh" x="824" y="237">Status</text>
  <text class="tableh" x="904" y="237">Notes</text>

  <rect class="warn" x="72" y="258" width="1176" height="38"/>
  <text class="table" x="92" y="283">4-bit baseline</text>
  <text class="value" x="360" y="283">3.64</text>
  <text class="value" x="470" y="283">8.58</text>
  <text class="value" x="570" y="283">9.46</text>
  <text class="value" x="690" y="283">50.6 ms</text>
  <text class="value" x="824" y="283">Baseline</text>
  <text class="table" x="904" y="283">Native MLX packed experts, clean serial timing reference</text>

  <rect class="good" x="72" y="296" width="1176" height="38"/>
  <text class="table" x="92" y="321">Q3-GGUF routed experts</text>
  <text class="value" x="360" y="321">3.81</text>
  <text class="value" x="470" y="321">10.11</text>
  <text class="value" x="570" y="321">11.15</text>
  <text class="value" x="690" y="321">37.15 ms</text>
  <text class="value" x="824" y="321">Keep</text>
  <text class="table" x="904" y="321">59 normal layers plus 1 outlier, exact GGUF bytes on disk</text>

  <rect class="good" x="72" y="334" width="1176" height="38"/>
  <text class="table" x="92" y="359">Q3-GGUF routed experts + GGUF LM head</text>
  <text class="value" x="360" y="359">3.79</text>
  <text class="value" x="470" y="359">10.14</text>
  <text class="table" x="570" y="359">n/a</text>
  <text class="table" x="690" y="359">n/a</text>
  <text class="value" x="824" y="359">Keep</text>
  <text class="table" x="904" y="359">Best measured full-PPL quality on the streamed-Q3 path so far</text>

