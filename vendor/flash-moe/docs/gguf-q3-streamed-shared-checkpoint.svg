  <text class="label" x="740" y="484">4-bit baseline</text>
  <rect class="barA" x="910" y="468" width="222" height="20" rx="10"/>
  <text class="value" x="1142" y="484">8.58</text>

  <text class="label" x="740" y="528">Q3-GGUF experts</text>
  <rect class="barB" x="910" y="512" width="261" height="20" rx="10"/>
  <text class="value" x="1181" y="528">10.11</text>

  <text class="label" x="740" y="572">Q3-GGUF + GGUF LM head</text>
  <rect class="barC" x="910" y="556" width="262" height="20" rx="10"/>
  <text class="value" x="1182" y="572">10.14</text>

  <text class="section" x="72" y="664">Routed Expert Layout</text>
  <rect class="note" x="72" y="690" width="560" height="176" rx="16"/>
  <text class="small" x="96" y="722">Finished streamed layout in `packed_experts_Q3/`:</text>
  <text class="small" x="96" y="750">1. Normal layers `0-26, 28-59`:</text>
  <text class="small" x="116" y="774">`gate = IQ3_XXS`, `up = IQ3_XXS`, `down = IQ4_XS`</text>
  <text class="small" x="96" y="802">2. Outlier layer `27`:</text>
  <text class="small" x="116" y="826">`gate = IQ4_XS`, `up = IQ4_XS`, `down = Q5_K`</text>
  <text class="small" x="96" y="854">All GGUF block sizes are preserved exactly. The temporary native 4-bit `down_proj` fallback is gone.</text>

  <text class="section" x="660" y="664">Shared Experts</text>
  <rect class="note" x="660" y="690" width="588" height="176" rx="16"/>
  <text class="small" x="684" y="722">Current shared-expert family from the GGUF sweep:</text>
  <text class="small" x="684" y="750">`ffn_gate_shexp.weight`: `Q8_0 x59`, `BF16 x1`</text>
  <text class="small" x="684" y="778">`ffn_up_shexp.weight`: `Q8_0 x59`, `BF16 x1`</text>
  <text class="small" x="684" y="806">`ffn_down_shexp.weight`: `Q8_0 x59`, `BF16 x1`</text>
  <text class="small" x="684" y="834">Status: not scripted yet. Shared experts should be brought up as their own experiment family, separate from routed experts.</text>
  <text class="small" x="684" y="862">Checkpoint: docs/gguf-q3-streamed-shared-checkpoint.svg</text>

  <rect class="note" x="72" y="886" width="1176" height="18" rx="8"/>
  <text class="small" x="92" y="900">Source metrics: docs/gguf-hybrid-bringup-log.md and docs/q3-vs-4bit-clean-timing-report.md. Full-PPL throughput uses `ppl_tokens_2k.bin`. Clean 200-token averages come from the serial timing rerun.</text>
</svg>
