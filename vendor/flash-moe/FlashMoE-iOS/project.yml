name: FlashMoE
options:
  bundleIdPrefix: ai.tokagotchi
  deploymentTarget:
    macOS: "26.0"
  xcodeVersion: "26.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "26.0"
    SDKROOT: macosx

targets:
  FlashMoE:
    type: application
    platform: macOS
    sources:
      - path: App
        type: group
      - path: Views
        type: group
      - path: ViewModels
        type: group
      - path: Bridge
        type: group
      - path: FlashMoEEngine
        type: group
      - path: Resources
        type: group
      # Main kernels must compile into default.metallib for app-bundled execution.
      - path: ../metal_infer/shaders.metal
        type: file
        buildPhase: sources
      - path: ../metal_infer/nax_gemm.metal
        type: file
        buildPhase: resources
      - path: ../metal_infer/tokenizer.h
        type: file
        buildPhase: headers
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.tokagotchi.flashmoe
        PRODUCT_NAME: FlashMoE
        SWIFT_OBJC_BRIDGING_HEADER: Bridge/FlashMoE-Bridging-Header.h
        OTHER_CFLAGS: "-DCHAT_MODE=1 -DACCELERATE_NEW_LAPACK"
        HEADER_SEARCH_PATHS:
          - $(SRCROOT)/FlashMoEEngine
          - $(SRCROOT)/../metal_infer
        CLANG_ENABLE_OBJC_ARC: YES
        GCC_OPTIMIZATION_LEVEL: "2"
        GCC_WARN_INHIBIT_ALL_WARNINGS: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_CFBundleDisplayName: "Flash-MoE"
        OTHER_LDFLAGS: "-lcompression"
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_ALLOWED: NO
        CODE_SIGNING_REQUIRED: NO
        ENABLE_APP_SANDBOX: NO
        ENABLE_HARDENED_RUNTIME: NO
    dependencies:
      - sdk: Metal.framework
      - sdk: Foundation.framework
      - sdk: Accelerate.framework
    preBuildScripts: []
    postBuildScripts: []
